<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Voyage · 여행 일정 웹앱</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  --lime:#A8E6CF;--accent:#4C3DAA;--accentSoft:#E8E4FA;--coral:#FFD4C4;--coralInk:#DC5A3E;
  --sky:#D6EFFF;--skyInk:#4A98CC;--sun:#FFEBB8;--sunInk:#75570B;--pink:#FFD6E8;--pinkInk:#B8447A;
  --ink:#0F0F0F;--paper:#FBFAF8;--muted:#6B6F70;--line:#EBE9E1;--white:#fff;--safe:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box}html,body,#root{margin:0;min-height:100%}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 8%,rgba(168,230,207,.38),transparent 38%),radial-gradient(circle at 88% 92%,rgba(232,228,250,.72),transparent 42%),#f3f1ec;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font:inherit}button{cursor:pointer}
.shell{width:100%;max-width:430px;min-height:100dvh;margin:0 auto;background:var(--paper);position:relative;overflow:hidden;box-shadow:0 24px 80px rgba(15,15,15,.13)}
@media(min-width:720px){body{padding:24px 0}.shell{min-height:calc(100dvh - 48px);border:1px solid rgba(15,15,15,.08);border-radius:28px}}
.app{min-height:inherit;display:flex;flex-direction:column}.top{position:sticky;top:0;z-index:20;padding:16px 18px 12px;background:rgba(251,250,248,.94);border-bottom:1px solid rgba(235,233,225,.82);backdrop-filter:blur(20px) saturate(170%);-webkit-backdrop-filter:blur(20px) saturate(170%)}
.topline{display:flex;align-items:center;justify-content:space-between;gap:12px}.pill{display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:7px;background:var(--ink);color:var(--lime);font:800 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.8px;text-transform:uppercase}
.icon{width:34px;height:34px;border:0;border-radius:17px;background:#fff;display:inline-grid;place-items:center;box-shadow:0 1px 2px rgba(15,15,15,.06),0 6px 18px rgba(15,15,15,.06);color:var(--ink)}
h1{margin:14px 0 0;font-size:28px;line-height:1.02;letter-spacing:-1px}.meta{margin-top:7px;color:var(--muted);font-size:13px;line-height:1.45}
.content{flex:1;overflow-y:auto;padding:14px 18px calc(88px + var(--safe))}.bottom{position:absolute;left:0;right:0;bottom:0;z-index:25;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:8px 12px calc(8px + var(--safe));background:rgba(251,250,248,.95);border-top:1px solid rgba(235,233,225,.9);backdrop-filter:blur(20px) saturate(170%)}
.nav{height:50px;border:0;border-radius:14px;background:transparent;color:#8B9092;font-size:10px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.nav.on{background:#fff;color:var(--accent);box-shadow:0 1px 2px rgba(15,15,15,.05)}
.summary{background:var(--ink);color:#fff;border-radius:20px;padding:18px;margin-bottom:14px}.dots{display:flex;gap:6px;margin-bottom:13px}.dot{width:8px;height:8px;border-radius:50%}.summary h2{margin:0;font-size:27px;line-height:1.04;letter-spacing:-.8px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}.stat{border-radius:13px;background:rgba(255,255,255,.08);padding:10px 12px}.stat b{display:block;color:var(--lime);font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.8px;text-transform:uppercase}.stat span{display:block;margin-top:6px;font-size:15px;font-weight:800}
.days{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}.days::-webkit-scrollbar{display:none}.day{flex:0 0 auto;min-width:78px;border:1px solid var(--line);border-radius:15px;background:#fff;color:var(--muted);padding:10px 12px;text-align:left}.day.on{background:var(--ink);border-color:var(--ink);color:#fff}.day b{display:block;font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.7px}.day span{display:block;margin-top:5px;font-size:12px;font-weight:800}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:5px 0 12px}.head h3{margin:0;font-size:20px;line-height:1.18;letter-spacing:-.45px}.textbtn{border:0;background:transparent;color:var(--accent);font-size:13px;font-weight:850;white-space:nowrap}.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}.panel h3{margin:0 0 12px;font-size:18px;letter-spacing:-.35px}
.timeline{display:grid;gap:10px}.row{display:grid;grid-template-columns:54px 1fr;gap:10px}.time{padding-top:13px;font:800 12px/1 ui-monospace,Menlo,monospace}.card{border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;text-align:left;width:100%;box-shadow:0 1px 2px rgba(15,15,15,.03);transition:transform .16s ease,box-shadow .16s ease}.card:active{transform:scale(.985)}.card.donecard{background:#f7fbf8;border-color:#d8eee2}.card.donecard .title{text-decoration:line-through;color:#7f8886}.cardtop{display:flex;justify-content:space-between;gap:10px}.title{font-size:16px;line-height:1.22;letter-spacing:-.25px;font-weight:850}.sub{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.45}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.chip{display:inline-flex;align-items:center;height:23px;padding:0 8px;border-radius:999px;font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.45px;white-space:nowrap}.transport{background:var(--accentSoft);color:var(--accent)}.stay{background:var(--lime);color:var(--ink)}.food{background:var(--coral);color:var(--coralInk)}.sight{background:var(--sky);color:var(--skyInk)}.activity{background:var(--pink);color:var(--pinkInk)}.ghostchip{background:#F5F3EE;color:var(--muted)}
.empty{border:1px dashed #d7d3c8;border-radius:18px;padding:22px 16px;text-align:center;color:var(--muted);background:#fff;font-size:14px;line-height:1.5}
.mapbox{height:342px;background:#fff;border:1px solid var(--line);border-radius:22px;position:relative;overflow:hidden;margin-bottom:14px;background-image:linear-gradient(#efede7 1px,transparent 1px),linear-gradient(90deg,#efede7 1px,transparent 1px);background-size:28px 28px}.river{position:absolute;left:-45px;top:178px;width:500px;height:74px;border-radius:50%;border-top:28px solid var(--sky);transform:rotate(-24deg);opacity:.75}.route{position:absolute;inset:0}.pin{position:absolute;width:34px;height:34px;border-radius:50%;border:2px solid var(--ink);display:grid;place-items:center;font:900 13px ui-monospace,Menlo,monospace;box-shadow:0 6px 14px rgba(15,15,15,.18)}
.maplist{display:grid;gap:8px}.mapitem{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:15px;padding:11px}.num{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:#fff;font:800 11px ui-monospace,Menlo,monospace;flex:0 0 auto}.mapitem b{font-size:14px}.mapitem span{display:block;margin-top:3px;color:var(--muted);font-size:12px}.mapitem a{margin-left:auto;text-decoration:none;color:var(--accent);font-size:12px;font-weight:850}
.phasebar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:13px 0 8px}.phase{min-height:40px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--muted);font-size:13px;font-weight:850}.phase.on{background:var(--ink);border-color:var(--ink);color:#fff}.checkrow{display:flex;align-items:center;gap:7px;border-bottom:1px solid #f0eee8}.check{display:flex;align-items:center;gap:10px;flex:1;padding:10px 0;min-width:0}.check input{width:20px;height:20px;accent-color:var(--accent);flex:0 0 auto}.check span{flex:1;font-size:14px;line-height:1.35}.check.done span{color:#A1A4A5;text-decoration:line-through}.removecheck{width:30px;height:30px;border:0;border-radius:10px;background:transparent;color:#9DA1A0;font-size:20px;line-height:1}.removecheck:active{background:var(--coral);color:var(--coralInk)}.emptycheck{padding:20px 0 14px;color:var(--muted);font-size:13px;line-height:1.5;text-align:center}.addrow{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}
.field,.select,.area{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:11px 12px;outline:0;font-size:14px}.area{min-height:86px;resize:vertical;line-height:1.5}.field:focus,.select:focus,.area:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(76,61,170,.1)}
.btn,.dark,.primary,.danger{min-height:43px;border-radius:13px;padding:0 14px;border:1px solid transparent;font-weight:850;font-size:14px}.primary{background:var(--lime);color:var(--ink)}.dark{background:var(--ink);color:#fff}.btn{background:#fff;color:var(--ink);border-color:var(--line)}.danger{background:#fff;color:var(--coralInk);border-color:var(--coral)}
.notice{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 14px;color:var(--muted);font-size:13px;line-height:1.55;margin-bottom:12px}.next{margin-top:15px;padding:12px 13px;border-radius:14px;background:rgba(168,230,207,.16);border:1px solid rgba(168,230,207,.28)}.next b{display:block;color:var(--lime);font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.75px;text-transform:uppercase}.next span{display:block;margin-top:6px;font-size:14px;line-height:1.35;font-weight:800}.minor{margin:0;color:var(--muted);font-size:12px;line-height:1.5}.toast{position:absolute;z-index:80;left:18px;right:18px;bottom:84px;background:var(--ink);color:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 10px 28px rgba(15,15,15,.25);font-size:13px;font-weight:750}.sheetback{position:absolute;inset:0;z-index:40;background:rgba(15,15,15,.36);display:flex;align-items:flex-end}.sheet{width:100%;max-height:90dvh;overflow:auto;background:var(--paper);border-radius:26px 26px 0 0;padding:16px 18px calc(20px + var(--safe));box-shadow:0 -16px 60px rgba(15,15,15,.22)}@media(min-width:720px){.sheetback{border-radius:28px;overflow:hidden}}
.sheethead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}.sheethead h2{margin:0;font-size:22px;line-height:1.15;letter-spacing:-.55px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form{margin-bottom:10px}.label{display:block;margin:0 0 6px;color:var(--muted);font-size:11px;font-weight:850;letter-spacing:.5px;text-transform:uppercase}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.switches{display:grid;grid-template-columns:1fr 1fr;gap:8px}.toggle{border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px 12px;text-align:left;font-weight:850;font-size:13px}.toggle.on{background:var(--accentSoft);border-color:var(--accentSoft);color:var(--accent)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel">
const {useEffect,useState}=React;
const KEY='voyage-api-free-v2';
const id=()=>Math.random().toString(36).slice(2,9);
const types={transport:'이동',stay:'숙소',food:'식당',sight:'관광',activity:'활동'};
const sample={destination:'대만 타이베이',dateLabel:'2026.07.18 - 07.21',daysLabel:'3박 4일',companions:'2명',days:[
{idx:1,date:'07.18 목',theme:'도착 & 시먼딩 야시장',places:[
{id:'a1',time:'10:35',type:'transport',title:'인천공항 T2 → 타오위안',sub:'중화항공 CI 161 · 항공권 캡처 확인',address:'Taoyuan International Airport',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'입국 후 MRT 공항선 확인'},
{id:'a2',time:'15:30',type:'stay',title:'시먼 인 호텔',sub:'체크인 · 바우처 저장',address:'Ximending Taipei',googleUrl:'',reservationNeeded:true,reservationStatus:'예약 완료',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'여권, 예약자명 확인'},
{id:'a3',time:'18:00',type:'food',title:'아종면선',sub:'곱창국수 · 웨이팅 가능',address:'Ay-Chung Flour-Rice Noodle Taipei',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:true,waitingEstimate:'20~30분',menu:'곱창국수',phrase:'고수 빼주세요: 不要香菜',memo:'현금 준비'},
{id:'a4',time:'19:30',type:'sight',title:'시먼딩 거리',sub:'야시장 산책 · 사진 포인트',address:'Ximending Walking District',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'사람 많은 구간 주의'}]},
{idx:2,date:'07.19 금',theme:'지우펀 & 진과스',places:[{id:'b1',time:'09:00',type:'food',title:'푸항또우장',sub:'현지식 조식',address:'Fu Hang Soy Milk Taipei',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:true,waitingEstimate:'30분 이상',menu:'또우장, 요우티아오',phrase:'포장 가능해요?',memo:'아침 일찍 이동'},{id:'b2',time:'12:00',type:'sight',title:'지우펀 옛거리',sub:'홍등 거리 · 계단 많음',address:'Jiufen Old Street',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'비 오면 우산 필요'}]},
{idx:3,date:'07.20 토',theme:'고궁 & 딤섬 데이',places:[{id:'c1',time:'10:00',type:'sight',title:'국립고궁박물원',sub:'취옥백채 보기',address:'National Palace Museum Taipei',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'오디오 가이드 확인'},{id:'c2',time:'13:00',type:'food',title:'딘타이펑 신이점',sub:'샤오롱바오 · 예약 메모 확인',address:'Din Tai Fung Xinyi Taipei',googleUrl:'',reservationNeeded:true,reservationStatus:'예약 완료',waitingNeeded:true,waitingEstimate:'45분',menu:'샤오롱바오, 새우 소룡포',phrase:'예약했어요: 我有預約',memo:'예약 코드 캡처 저장'}]},
{idx:4,date:'07.21 일',theme:'마무리 & 귀국',places:[{id:'d1',time:'09:00',type:'food',title:'융캉 우육면',sub:'마지막 식사',address:'Yongkang Beef Noodles Taipei',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:true,waitingEstimate:'20분',menu:'우육면',phrase:'덜 맵게 해주세요',memo:''},{id:'d2',time:'15:00',type:'transport',title:'시먼역 → 타오위안',sub:'공항 MRT 이동',address:'Ximen Station Taipei',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'출국 3시간 전 출발'}]}],
checklist:[{id:'ck1',text:'여권 유효기간 확인',done:true},{id:'ck2',text:'이심/유심 준비',done:true},{id:'ck3',text:'환전 및 해외결제 확인',done:false},{id:'ck4',text:'식당 예약 메모 입력',done:false},{id:'ck5',text:'Google Maps 오프라인 지도 다운로드',done:false}],journal:''};
/* legacy v2 UI retained below for reference
function load(){try{return JSON.parse(localStorage.getItem(KEY))||sample}catch{return sample}}
function mapsUrl(p){if(p.googleUrl)return p.googleUrl;const q=encodeURIComponent([p.title,p.address].filter(Boolean).join(' '));return q?`https://www.google.com/maps/search/?api=1&query=${q}`:''}
function App(){const[trip,setTripRaw]=useState(load);const[tab,setTab]=useState('schedule');const[day,setDay]=useState(1);const[place,setPlace]=useState(null);const[tripEdit,setTripEdit]=useState(false);const[newCheck,setNewCheck]=useState('');const setTrip=u=>setTripRaw(prev=>{const next=typeof u==='function'?u(prev):u;localStorage.setItem(KEY,JSON.stringify(next));return next});const cur=trip.days.find(d=>d.idx===day)||trip.days[0];const count=trip.days.reduce((s,d)=>s+d.places.length,0);const done=trip.checklist.filter(c=>c.done).length;const addPlace=()=>setPlace({id:id(),dayIdx:day,time:'',type:'sight',title:'',sub:'',address:'',googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'',isNew:true});const savePlace=p=>{setTrip(t=>({...t,days:t.days.map(d=>{if(d.idx!==p.dayIdx)return d;const clean={...p};delete clean.dayIdx;delete clean.isNew;const exists=d.places.some(x=>x.id===p.id);return {...d,places:(exists?d.places.map(x=>x.id===p.id?clean:x):[...d.places,clean]).sort((a,b)=>String(a.time).localeCompare(String(b.time)))}})}));setPlace(null)};const delPlace=p=>{setTrip(t=>({...t,days:t.days.map(d=>d.idx===p.dayIdx?{...d,places:d.places.filter(x=>x.id!==p.id)}:d)}));setPlace(null)};return <div className="shell"><div className="app"><header className="top"><div className="topline"><span className="pill">Voyage · api-free</span><button className="icon" onClick={()=>setTripEdit(true)}>✎</button></div><h1>{trip.destination}</h1><div className="meta">{trip.dateLabel} · {trip.daysLabel} · {trip.companions}</div></header><main className="content">{tab==='schedule'&&<Schedule trip={trip} cur={cur} day={day} setDay={setDay} count={count} done={done} addPlace={addPlace} open={p=>setPlace({...p,dayIdx:day})}/>} {tab==='check'&&<Checklist trip={trip} setTrip={setTrip} newCheck={newCheck} setNewCheck={setNewCheck}/>} {tab==='route'&&<Route trip={trip} day={day} setDay={setDay} open={p=>setPlace(p)}/>} {tab==='journal'&&<Journal trip={trip} setTrip={setTrip}/>}</main><nav className="bottom"><Nav id="schedule" label="일정" icon="▤" tab={tab} setTab={setTab}/><Nav id="check" label="체크" icon="✓" tab={tab} setTab={setTab}/><Nav id="route" label="동선" icon="⌖" tab={tab} setTab={setTab}/><Nav id="journal" label="기록" icon="✎" tab={tab} setTab={setTab}/></nav></div>{place&&<PlaceSheet place={place} setPlace={setPlace} save={savePlace} del={delPlace}/>} {tripEdit&&<TripSheet trip={trip} setTrip={setTrip} close={()=>setTripEdit(false)}/>}</div>}
function Summary({cur,day,count,done,total}){return <section className="summary"><div className="dots"><i className="dot" style={{background:'var(--lime)'}}/><i className="dot" style={{background:'var(--coralInk)'}}/><i className="dot" style={{background:'var(--accent)'}}/><i className="dot" style={{background:'var(--skyInk)'}}/><i className="dot" style={{background:'var(--sunInk)'}}/></div><h2>{cur.theme||`${day}일차 일정`}</h2><div className="stats"><div className="stat"><b>day</b><span>DAY {day} · {cur.date}</span></div><div className="stat"><b>places</b><span>{count}개 장소</span></div><div className="stat"><b>check</b><span>{done}/{total} 완료</span></div><div className="stat"><b>mode</b><span>직접 입력</span></div></div></section>}

function Checklist({trip,setTrip,newCheck,setNewCheck}){const add=()=>{const text=newCheck.trim();if(!text)return;setTrip(t=>({...t,checklist:[...t.checklist,{id:id(),text,done:false}]}));setNewCheck('')};return <section className="panel"><h3>체크리스트</h3><p className="minor">여행 전후에 필요한 것만 가볍게 정리하세요.</p>{trip.checklist.map(c=><label key={c.id} className={'check '+(c.done?'done':'')}><input type="checkbox" checked={c.done} onChange={e=>setTrip(t=>({...t,checklist:t.checklist.map(x=>x.id===c.id?{...x,done:e.target.checked}:x)}))}/><span>{c.text}</span></label>)}<div className="addrow"><input className="field" value={newCheck} onChange={e=>setNewCheck(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')add()}} placeholder="준비할 것을 입력하세요"/><button className="dark" onClick={add}>추가</button></div></section>}
function Journal({trip,setTrip}){return <section className="panel"><h3>여행 메모</h3><p className="minor">좋았던 곳, 다음에 다시 갈 곳, 친구에게 남길 팁을 적어두세요.</p><textarea className="area" style={{marginTop:12,minHeight:220}} value={trip.journal} onChange={e=>setTrip(t=>({...t,journal:e.target.value}))} placeholder="예: 아종면선은 저녁 6시 전이 비교적 덜 붐볐음. 다음에는 곱빼기 주문."/></section>}
function PlaceSheet({place,setPlace,save,del}){const up=(k,v)=>setPlace(p=>({...p,[k]:v}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className={'chip '+place.type}>DAY {place.dayIdx} · {types[place.type]}</span><h2 style={{marginTop:8}}>{place.title||'장소 입력'}</h2></div><button className="icon" aria-label="닫기" onClick={()=>setPlace(null)}>×</button></div><div className="grid"><Field label="시간"><input className="field" value={place.time} onChange={e=>up('time',e.target.value)} placeholder="13:00"/></Field><Field label="분류"><select className="select" value={place.type} onChange={e=>up('type',e.target.value)}>{Object.entries(types).map(([v,l])=><option value={v} key={v}>{l}</option>)}</select></Field></div><Field label="장소명"><input className="field" value={place.title} onChange={e=>up('title',e.target.value)} placeholder="딘타이펑 신이점"/></Field><Field label="한 줄 설명"><input className="field" value={place.sub} onChange={e=>up('sub',e.target.value)} placeholder="샤오롱바오 · 예약 완료"/></Field><Field label="주소 또는 검색어"><input className="field" value={place.address} onChange={e=>up('address',e.target.value)} placeholder="주소 또는 Google Maps 검색어"/></Field><Field label="Google Maps 링크"><input className="field" value={place.googleUrl} onChange={e=>up('googleUrl',e.target.value)} placeholder="https://maps.app.goo.gl/..."/></Field><div className="grid"><Field label="운영/이용 시간"><input className="field" value={place.hours} onChange={e=>up('hours',e.target.value)} placeholder="11:00 - 21:00"/></Field><Field label="다음 장소까지 이동"><input className="field" value={place.move} onChange={e=>up('move',e.target.value)} placeholder="도보 12분"/></Field></div><div className="switches"><button className={'toggle '+(place.reservationNeeded?'on':'')} onClick={()=>up('reservationNeeded',!place.reservationNeeded)}>예약 필요 {place.reservationNeeded?'ON':'OFF'}</button><button className={'toggle '+(place.waitingNeeded?'on':'')} onClick={()=>up('waitingNeeded',!place.waitingNeeded)}>웨이팅 {place.waitingNeeded?'ON':'OFF'}</button></div><button className={'toggle '+(place.completed?'on':'')} style={{width:'100%',marginTop:8}} onClick={()=>up('completed',!place.completed)}>방문 완료 {place.completed?'ON':'OFF'}</button><div className="grid" style={{marginTop:10}}><Field label="예약 상태"><input className="field" value={place.reservationStatus} onChange={e=>up('reservationStatus',e.target.value)} placeholder="예약 완료"/></Field><Field label="예상 웨이팅"><input className="field" value={place.waitingEstimate} onChange={e=>up('waitingEstimate',e.target.value)} placeholder="30~45분"/></Field></div><Field label="추천 메뉴"><input className="field" value={place.menu} onChange={e=>up('menu',e.target.value)} placeholder="샤오롱바오, 우육면"/></Field><Field label="번역/주문 문장"><textarea className="area" value={place.phrase} onChange={e=>up('phrase',e.target.value)} placeholder="현장에서 보여줄 문장을 미리 적어두세요."/></Field><Field label="메모"><textarea className="area" value={place.memo} onChange={e=>up('memo',e.target.value)} placeholder="주의사항, 결제, 이동 팁"/></Field><div className="actions"><a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={mapsUrl(place)} target="_blank" rel="noreferrer">지도 열기</a><button className="primary" onClick={()=>save(place)}>저장</button></div>{!place.isNew&&<button className="danger" style={{width:'100%',marginTop:8}} onClick={()=>del(place)}>장소 삭제</button>}</div></div>}
function TripSheet({trip,setTrip,close,share,exportTrip,importTrip}){const[d,setD]=useState(trip);const up=(k,v)=>setD(p=>({...p,[k]:v}));const upd=(idx,k,v)=>setD(p=>({...p,days:p.days.map(day=>day.idx===idx?{...day,[k]:v}:day)}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><h2>여행 관리</h2><button className="icon" aria-label="닫기" onClick={close}>×</button></div><section className="panel"><h3>공유 및 백업</h3><p className="minor">공유 링크를 연 사람은 같은 계획을 자기 기기에 저장할 수 있습니다. 이후 수정 내용은 자동으로 서로 동기화되지 않습니다.</p><div className="actions"><button className="dark" onClick={share}>공유 링크 복사</button><button className="btn" onClick={exportTrip}>백업 파일 저장</button></div><label className="btn" style={{display:'flex',alignItems:'center',justifyContent:'center',marginTop:8,minHeight:43,cursor:'pointer'}}>백업 파일 불러오기<input type="file" accept="application/json" onChange={importTrip} style={{display:'none'}}/></label></section><Field label="여행명"><input className="field" value={d.destination} onChange={e=>up('destination',e.target.value)}/></Field><div className="grid"><Field label="날짜"><input className="field" value={d.dateLabel} onChange={e=>up('dateLabel',e.target.value)}/></Field><Field label="인원"><input className="field" value={d.companions} onChange={e=>up('companions',e.target.value)}/></Field></div>{d.days.map(day=><section className="panel" key={day.idx}><h3>DAY {day.idx}</h3><Field label="날짜 라벨"><input className="field" value={day.date} onChange={e=>upd(day.idx,'date',e.target.value)}/></Field><Field label="하루 주제"><input className="field" value={day.theme} onChange={e=>upd(day.idx,'theme',e.target.value)}/></Field></section>)}<button className="primary" style={{width:'100%'}} onClick={()=>{setTrip(d);close()}}>여행 정보 저장</button></div></div>}
function IncomingSheet({trip,accept,close}){return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className="pill">공유 받은 일정</span><h2 style={{marginTop:10}}>{trip.destination}</h2></div><button className="icon" aria-label="닫기" onClick={close}>×</button></div><p className="minor">{trip.dateLabel} · {trip.daysLabel} · {trip.companions}</p><div className="notice" style={{marginTop:14}}>이 계획을 저장하면 지금 이 브라우저에 있는 Voyage 일정은 공유 받은 내용으로 바뀝니다. 이 링크는 실시간 공동 편집 기능이 아닙니다.</div><div className="actions"><button className="btn" onClick={close}>나중에 보기</button><button className="primary" onClick={accept}>이 기기에 저장</button></div></div></div>}
Checklist=function ChecklistByPhase({trip,setTrip,newCheck,setNewCheck}){const[phase,setPhase]=useState('before');const items=trip.checklist.filter(c=>(c.phase||'before')===phase);const add=()=>{const text=newCheck.trim();if(!text)return;setTrip(t=>({...t,checklist:[...t.checklist,{id:id(),text,done:false,phase}]}));setNewCheck('')};const remove=id=>setTrip(t=>({...t,checklist:t.checklist.filter(c=>c.id!==id)}));return <section className="panel"><h3>체크리스트</h3><p className="minor">여행 전 준비와 여행 중 확인할 일을 나눠서 적으세요.</p><div className="phasebar"><button className={'phase '+(phase==='before'?'on':'')} onClick={()=>setPhase('before')}>여행 전</button><button className={'phase '+(phase==='during'?'on':'')} onClick={()=>setPhase('during')}>여행 중</button></div>{items.length?items.map(c=><div key={c.id} className="checkrow"><label className={'check '+(c.done?'done':'')}><input type="checkbox" checked={c.done} onChange={e=>setTrip(t=>({...t,checklist:t.checklist.map(x=>x.id===c.id?{...x,done:e.target.checked}:x)}))}/><span>{c.text}</span></label><button className="removecheck" aria-label={`${c.text} 삭제`} onClick={()=>remove(c.id)}>×</button></div>):<div className="emptycheck">이 구분에 아직 체크 항목이 없습니다.</div>}<div className="addrow"><input className="field" value={newCheck} onChange={e=>setNewCheck(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')add()}} placeholder={phase==='before'?'여행 전에 준비할 것을 입력하세요':'여행 중 확인할 것을 입력하세요'}/><button className="dark" onClick={add}>추가</button></div></section>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
