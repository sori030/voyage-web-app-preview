function normalise(value){if(!value||!Array.isArray(value.days))return JSON.parse(JSON.stringify(sample));return {...value,days:value.days.map(d=>({...d,places:(d.places||[]).map(p=>({completed:false,move:'',hours:'',linkUrl:'',linkLabel:'',...p}))})),checklist:(value.checklist||[]).map(c=>({phase:'before',...c})),journal:value.journal||''}}

function encodeTrip(trip){return btoa(unescape(encodeURIComponent(JSON.stringify(trip))))}
function decodeTrip(value){return normalise(JSON.parse(decodeURIComponent(escape(atob(value))))) }
function mapsUrl(p){if(p.googleUrl)return p.googleUrl;const q=encodeURIComponent([p.title,p.address].filter(Boolean).join(' '));return q?`https://www.google.com/maps/search/?api=1&query=${q}`:''}

function App(){const[trip,setTripRaw]=useState(load);const[tab,setTab]=useState('schedule');const[day,setDay]=useState(1);const[place,setPlace]=useState(null);const[tripEdit,setTripEdit]=useState(false);const[newCheck,setNewCheck]=useState('');const[notice,setNotice]=useState('');const[incoming,setIncoming]=useState(null);const setTrip=u=>setTripRaw(prev=>{const next=normalise(typeof u==='function'?u(prev):u);localStorage.setItem(KEY,JSON.stringify(next));return next});useEffect(()=>{if(!notice)return;const timer=setTimeout(()=>setNotice(''),3200);return()=>clearTimeout(timer)},[notice]);useEffect(()=>{try{const payload=new URLSearchParams(window.location.hash.slice(1)).get('trip');if(payload)setIncoming(decodeTrip(payload))}catch{setNotice('공유 링크를 읽지 못했습니다. 새 링크를 받아 다시 열어보세요.')}if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('./sw.js').catch(()=>{})},[]);const cur=trip.days.find(d=>d.idx===day)||trip.days[0];const addPlace=()=>setPlace({id:id(),dayIdx:day,time:'',type:'sight',title:'',sub:'',address:'',googleUrl:'',linkUrl:'',linkLabel:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'',completed:false,move:'',hours:'',isNew:true});const savePlace=p=>{setTrip(t=>({...t,days:t.days.map(d=>{if(d.idx!==p.dayIdx)return d;const clean={...p};delete clean.dayIdx;delete clean.isNew;const exists=d.places.some(x=>x.id===p.id);return {...d,places:(exists?d.places.map(x=>x.id===p.id?clean:x):[...d.places,clean]).sort((a,b)=>String(a.time).localeCompare(String(b.time)))}})}));setPlace(null)};const delPlace=p=>{setTrip(t=>({...t,days:t.days.map(d=>d.idx===p.dayIdx?{...d,places:d.places.filter(x=>x.id!==p.id)}:d)}));setPlace(null)};const share=async()=>{const url=location.href.split('#')[0]+'#trip='+encodeURIComponent(encodeTrip(trip));try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(url);setNotice('공유 링크를 복사했습니다. 친구가 열면 자기 기기에 저장할 수 있어요.')}else window.prompt('공유 링크를 복사하세요.',url)}catch{window.prompt('공유 링크를 복사하세요.',url)}};const exportTrip=()=>{const blob=new Blob([JSON.stringify(trip,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='voyage-'+(trip.destination||'trip')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),300);setNotice('여행 계획 백업 파일을 저장했습니다.')};const importTrip=e=>{const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{setTrip(decodeTrip(encodeTrip(JSON.parse(reader.result))));setNotice('백업 파일을 이 기기에 불러왔습니다.')}catch{setNotice('읽을 수 없는 백업 파일입니다.')}e.target.value=''};reader.readAsText(file)};const acceptIncoming=()=>{setTrip(incoming);setIncoming(null);history.replaceState(null,'',location.pathname+location.search);setNotice('공유 받은 여행 계획을 이 기기에 저장했습니다.')};return <div className="shell"><div className="app"><header className="top"><div className="topline"><span className="pill">Voyage · 여행 일정</span><button className="icon" aria-label="여행 관리" onClick={()=>setTripEdit(true)}>⋯</button></div><h1>{trip.destination}</h1><div className="meta">{trip.dateLabel} · {trip.daysLabel} · {trip.companions}</div></header><main className="content">{tab==='schedule'&&<Schedule trip={trip} cur={cur} day={day} setDay={setDay} addPlace={addPlace} open={p=>setPlace({...p,dayIdx:day})}/>} {tab==='check'&&<Checklist trip={trip} setTrip={setTrip} newCheck={newCheck} setNewCheck={setNewCheck}/>} {tab==='route'&&<Route trip={trip} day={day} setDay={setDay} open={p=>setPlace(p)}/>} {tab==='journal'&&<Journal trip={trip} setTrip={setTrip}/>}</main><nav className="bottom"><Nav id="schedule" label="일정" icon="▤" tab={tab} setTab={setTab}/><Nav id="check" label="체크" icon="✓" tab={tab} setTab={setTab}/><Nav id="route" label="동선" icon="⌖" tab={tab} setTab={setTab}/><Nav id="journal" label="메모" icon="✎" tab={tab} setTab={setTab}/></nav></div>{place&&<PlaceSheet place={place} setPlace={setPlace} save={savePlace} del={delPlace}/>} {tripEdit&&<TripSheet trip={trip} setTrip={setTrip} close={()=>setTripEdit(false)} share={share} exportTrip={exportTrip} importTrip={importTrip}/>} {incoming&&<IncomingSheet trip={incoming} accept={acceptIncoming} close={()=>{setIncoming(null);history.replaceState(null,'',location.pathname+location.search)}}/>}{notice&&<div className="toast">{notice}</div>}</div>}
function Summary({cur,day}){const next=cur.places.find(p=>!p.completed);return <section className="summary"><div className="dots"><i className="dot" style={{background:'var(--lime)'}}/><i className="dot" style={{background:'var(--coralInk)'}}/><i className="dot" style={{background:'var(--accent)'}}/><i className="dot" style={{background:'var(--skyInk)'}}/></div><h2>{cur.theme||`${day}일차 일정`}</h2><div className="stats"><div className="stat"><b>day</b><span>DAY {day} · {cur.date}</span></div><div className="stat"><b>stops</b><span>{cur.places.length}개 장소</span></div></div><div className="next"><b>{next?'다음 일정':'오늘 일정 완료'}</b><span>{next?`${next.time||'시간 미정'} · ${next.title||'장소명 미입력'}`:'기록 탭에서 오늘의 한 줄을 남겨보세요.'}</span></div></section>}

function Route({trip,day,setDay,open}){const cur=trip.days.find(d=>d.idx===day)||trip.days[0];const pts=cur.places.map((p,i)=>({p,x:[64,135,218,292,105,250][i%6],y:[58,126,196,266,245,82][i%6]}));const path=pts.map((pt,i)=>(i?'L':'M')+pt.x+' '+pt.y).join(' ');return <><DayTabs trip={trip} day={day} setDay={setDay}/><div className="notice">일정 입력 순서대로 보는 동선 배치도입니다. 실제 위치와 길찾기는 각 장소의 Google Maps 링크에서 확인하세요.</div><section className="mapbox"><div className="river"/><svg className="route" viewBox="0 0 390 342" aria-label="일정 순서 동선"><path d={path} fill="none" stroke="#0F0F0F" strokeWidth="2.8" strokeDasharray="7 6" strokeLinecap="round"/></svg>{pts.map((pt,i)=><div key={pt.p.id} className="pin" style={{left:pt.x-17,top:pt.y-17,background:i%4===0?'var(--accentSoft)':i%4===1?'var(--lime)':i%4===2?'var(--coral)':'var(--sky)',color:i%4===0?'var(--accent)':i%4===2?'var(--coralInk)':i%4===3?'var(--skyInk)':'var(--ink)'}}>{i+1}</div>)}</section><div className="maplist">{cur.places.map((p,i)=><div className="mapitem" key={p.id}><div className="num">{i+1}</div><button className="textbtn" style={{textAlign:'left',color:'inherit',padding:0,flex:1}} onClick={()=>open({...p,dayIdx:day})}><b>{p.time||'--:--'} · {p.title}</b><span>{p.move?`다음 장소까지 ${p.move} · `:''}{p.address||p.sub||'주소를 입력하세요.'}</span></button><a href={mapsUrl(p)} target="_blank" rel="noreferrer">지도</a>{p.linkUrl&&<a href={p.linkUrl} target="_blank" rel="noreferrer">{p.linkLabel||'링크'}</a>}</div>)}</div></>}
function Checklist({trip,setTrip,newCheck,setNewCheck}){const add=()=>{const text=newCheck.trim();if(!text)return;setTrip(t=>({...t,checklist:[...t.checklist,{id:id(),text,done:false}]}));setNewCheck('')};return <section className="panel"><h3>체크리스트</h3><p className="minor">여행 전후에 필요한 것만 가볍게 정리하세요.</p>{trip.checklist.map(c=><label key={c.id} className={'check '+(c.done?'done':'')}><input type="checkbox" checked={c.done} onChange={e=>setTrip(t=>({...t,checklist:t.checklist.map(x=>x.id===c.id?{...x,done:e.target.checked}:x)}))}/><span>{c.text}</span></label>)}<div className="addrow"><input className="field" value={newCheck} onChange={e=>setNewCheck(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')add()}} placeholder="준비할 것을 입력하세요"/><button className="dark" onClick={add}>추가</button></div></section>}
function Journal({trip,setTrip}){return <section className="panel"><h3>여행 메모</h3><p className="minor">좋았던 곳, 다음에 다시 갈 곳, 친구에게 남길 팁을 적어두세요.</p><textarea className="area" style={{marginTop:12,minHeight:220}} value={trip.journal} onChange={e=>setTrip(t=>({...t,journal:e.target.value}))} placeholder="예: 아종면선은 저녁 6시 전이 비교적 덜 붐볐음. 다음에는 곱빼기 주문."/></section>}
function PlaceSheet({place,setPlace,save,del}){const up=(k,v)=>setPlace(p=>({...p,[k]:v}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className={'chip '+place.type}>DAY {place.dayIdx} · {types[place.type]}</span><h2 style={{marginTop:8}}>{place.title||'장소 입력'}</h2></div><button className="icon" aria-label="닫기" onClick={()=>setPlace(null)}>×</button></div><div className="grid"><Field label="시간"><input className="field" value={place.time} onChange={e=>up('time',e.target.value)} placeholder="13:00"/></Field><Field label="분류"><select className="select" value={place.type} onChange={e=>up('type',e.target.value)}>{Object.entries(types).map(([v,l])=><option value={v} key={v}>{l}</option>)}</select></Field></div><Field label="장소명"><input className="field" value={place.title} onChange={e=>up('title',e.target.value)} placeholder="딘타이펑 신이점"/></Field><Field label="한 줄 설명"><input className="field" value={place.sub} onChange={e=>up('sub',e.target.value)} placeholder="샤오롱바오 · 예약 완료"/></Field><Field label="주소 또는 검색어"><input className="field" value={place.address} onChange={e=>up('address',e.target.value)} placeholder="주소 또는 Google Maps 검색어"/></Field><Field label="Google Maps 링크"><input className="field" value={place.googleUrl} onChange={e=>up('googleUrl',e.target.value)} placeholder="https://maps.app.goo.gl/..."/></Field><div className="grid"><Field label="예매/참고 링크 이름"><input className="field" value={place.linkLabel||''} onChange={e=>up('linkLabel',e.target.value)} placeholder="페리 예매, 후기, 시간표"/></Field><Field label="예매/참고 링크"><input className="field" value={place.linkUrl||''} onChange={e=>up('linkUrl',e.target.value)} placeholder="https://..."/></Field></div><div className="grid"><Field label="운영/이용 시간"><input className="field" value={place.hours} onChange={e=>up('hours',e.target.value)} placeholder="11:00 - 21:00"/></Field><Field label="다음 장소까지 이동"><input className="field" value={place.move} onChange={e=>up('move',e.target.value)} placeholder="도보 12분"/></Field></div><div className="switches"><button className={'toggle '+(place.reservationNeeded?'on':'')} onClick={()=>up('reservationNeeded',!place.reservationNeeded)}>예약 필요 {place.reservationNeeded?'ON':'OFF'}</button><button className={'toggle '+(place.waitingNeeded?'on':'')} onClick={()=>up('waitingNeeded',!place.waitingNeeded)}>웨이팅 {place.waitingNeeded?'ON':'OFF'}</button></div><button className={'toggle '+(place.completed?'on':'')} style={{width:'100%',marginTop:8}} onClick={()=>up('completed',!place.completed)}>방문 완료 {place.completed?'ON':'OFF'}</button><div className="grid" style={{marginTop:10}}><Field label="예약 상태"><input className="field" value={place.reservationStatus} onChange={e=>up('reservationStatus',e.target.value)} placeholder="예약 완료"/></Field><Field label="예상 웨이팅"><input className="field" value={place.waitingEstimate} onChange={e=>up('waitingEstimate',e.target.value)} placeholder="30~45분"/></Field></div><Field label="추천 메뉴"><input className="field" value={place.menu} onChange={e=>up('menu',e.target.value)} placeholder="샤오롱바오, 우육면"/></Field><Field label="번역/주문 문장"><textarea className="area" value={place.phrase} onChange={e=>up('phrase',e.target.value)} placeholder="현장에서 보여줄 문장을 미리 적어두세요."/></Field><Field label="메모"><textarea className="area" value={place.memo} onChange={e=>up('memo',e.target.value)} placeholder="주의사항, 결제, 이동 팁"/></Field><div className="actions"><a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={mapsUrl(place)} target="_blank" rel="noreferrer">지도 열기</a>{place.linkUrl&&<a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={place.linkUrl} target="_blank" rel="noreferrer">{place.linkLabel||'링크 열기'}</a>}<button className="primary" onClick={()=>save(place)}>저장</button></div>{!place.isNew&&<button className="danger" style={{width:'100%',marginTop:8}} onClick={()=>del(place)}>장소 삭제</button>}</div></div>}
function TripSheet({trip,setTrip,close,share,exportTrip,importTrip}){const[d,setD]=useState(trip);const up=(k,v)=>setD(p=>({...p,[k]:v}));const upd=(idx,k,v)=>setD(p=>({...p,days:p.days.map(day=>day.idx===idx?{...day,[k]:v}:day)}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><h2>여행 관리</h2><button className="icon" aria-label="닫기" onClick={close}>×</button></div><section className="panel"><h3>공유 및 백업</h3><p className="minor">공유 링크를 연 사람은 같은 계획을 자기 기기에 저장할 수 있습니다. 이후 수정 내용은 자동으로 서로 동기화되지 않습니다.</p><div className="actions"><button className="dark" onClick={share}>공유 링크 복사</button><button className="btn" onClick={exportTrip}>백업 파일 저장</button></div><label className="btn" style={{display:'flex',alignItems:'center',justifyContent:'center',marginTop:8,minHeight:43,cursor:'pointer'}}>백업 파일 불러오기<input type="file" accept="application/json" onChange={importTrip} style={{display:'none'}}/></label></section><Field label="여행명"><input className="field" value={d.destination} onChange={e=>up('destination',e.target.value)}/></Field><div className="grid"><Field label="날짜"><input className="field" value={d.dateLabel} onChange={e=>up('dateLabel',e.target.value)}/></Field><Field label="인원"><input className="field" value={d.companions} onChange={e=>up('companions',e.target.value)}/></Field></div>{d.days.map(day=><section className="panel" key={day.idx}><h3>DAY {day.idx}</h3><Field label="날짜 라벨"><input className="field" value={day.date} onChange={e=>upd(day.idx,'date',e.target.value)}/></Field><Field label="하루 주제"><input className="field" value={day.theme} onChange={e=>upd(day.idx,'theme',e.target.value)}/></Field></section>)}<button className="primary" style={{width:'100%'}} onClick={()=>{setTrip(d);close()}}>여행 정보 저장</button></div></div>}
function IncomingSheet({trip,accept,close}){return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className="pill">공유 받은 일정</span><h2 style={{marginTop:10}}>{trip.destination}</h2></div><button className="icon" aria-label="닫기" onClick={close}>×</button></div><p className="minor">{trip.dateLabel} · {trip.daysLabel} · {trip.companions}</p><div className="notice" style={{marginTop:14}}>이 계획을 저장하면 지금 이 브라우저에 있는 Voyage 일정은 공유 받은 내용으로 바뀝니다. 이 링크는 실시간 공동 편집 기능이 아닙니다.</div><div className="actions"><button className="btn" onClick={close}>나중에 보기</button><button className="primary" onClick={accept}>이 기기에 저장</button></div></div></div>}
Checklist=function ChecklistByPhase({trip,setTrip,newCheck,setNewCheck}){const[phase,setPhase]=useState('before');const items=trip.checklist.filter(c=>(c.phase||'before')===phase);const add=()=>{const text=newCheck.trim();if(!text)return;setTrip(t=>({...t,checklist:[...t.checklist,{id:id(),text,done:false,phase}]}));setNewCheck('')};const remove=id=>setTrip(t=>({...t,checklist:t.checklist.filter(c=>c.id!==id)}));return <section className="panel"><h3>체크리스트</h3><p className="minor">여행 전 준비와 여행 중 확인할 일을 나눠서 적으세요.</p><div className="phasebar"><button className={'phase '+(phase==='before'?'on':'')} onClick={()=>setPhase('before')}>여행 전</button><button className={'phase '+(phase==='during'?'on':'')} onClick={()=>setPhase('during')}>여행 중</button></div>{items.length?items.map(c=><div key={c.id} className="checkrow"><label className={'check '+(c.done?'done':'')}><input type="checkbox" checked={c.done} onChange={e=>setTrip(t=>({...t,checklist:t.checklist.map(x=>x.id===c.id?{...x,done:e.target.checked}:x)}))}/><span>{c.text}</span></label><button className="removecheck" aria-label={`${c.text} 삭제`} onClick={()=>remove(c.id)}>×</button></div>):<div className="emptycheck">이 구분에 아직 체크 항목이 없습니다.</div>}<div className="addrow"><input className="field" value={newCheck} onChange={e=>setNewCheck(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')add()}} placeholder={phase==='before'?'여행 전에 준비할 것을 입력하세요':'여행 중 확인할 것을 입력하세요'}/><button className="dark" onClick={add}>추가</button></div></section>}

function cloneData(value){return JSON.parse(JSON.stringify(value))}
function cleanItem(item){const clean={...item,links:normaliseLinks(item),linkUrl:'',linkLabel:''};delete clean.dayIdx;delete clean.isNew;delete clean.targetDay;delete clean.sourceDay;return clean}
function normaliseLinks(item){const raw=Array.isArray(item?.links)?item.links:[];const links=raw.filter(link=>link&&(link.url||link.label)).map(link=>({id:link.id||id(),label:link.label||'',url:link.url||''}));if(item?.linkUrl&&!links.some(link=>link.url===item.linkUrl))links.unshift({id:id(),label:item.linkLabel||'참고 링크',url:item.linkUrl});return links}
function placeDefaults(place){const merged={completed:false,move:'',hours:'',linkUrl:'',linkLabel:'',links:[],googleUrl:'',reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'',...place};return {...merged,linkUrl:'',linkLabel:'',links:normaliseLinks(merged)}}
function candidateFromPlace(place,day){return {...placeDefaults(place),id:place.id||id(),sourceDay:place.sourceDay||day?.idx||'',region:place.region||(day?.idx===2?'타이난':day?.idx===3?'소류구':'가오슝')}}
function seedTrip(){const base=cloneData(sample);const candidates=base.days.flatMap(day=>(day.places||[]).map(place=>candidateFromPlace(place,day)));return {...base,schemaVersion:5,days:base.days.map(day=>({...day,theme:`DAY ${day.idx} 직접 구성`,places:[]})),candidates,journal:'후보 보관함에서 갈 곳을 고른 뒤 일정에 추가하세요. 구글맵 링크는 검색 링크로 연결되어 있으며, 실제 장소 확인 후 공유 링크로 교체할 수 있습니다.'}}
normalise=function(value){if(!value||!Array.isArray(value.days))return seedTrip();const base=cloneData(value);const hasCandidates=Array.isArray(base.candidates);const candidates=(hasCandidates?base.candidates:base.days.flatMap(day=>(day.places||[]).map(place=>candidateFromPlace(place,day)))).map(candidateFromPlace);return {...base,schemaVersion:5,days:base.days.map(day=>({...day,places:(hasCandidates?(day.places||[]):[]).map(p=>placeDefaults(p))})),candidates,checklist:(base.checklist||[]).map(c=>({phase:'before',...c})),journal:base.journal||''}}
load=function(){try{return normalise(JSON.parse(localStorage.getItem(KEY))||seedTrip())}catch{return seedTrip()}}
function emptyPlace(dayIdx){return {id:id(),dayIdx,time:'',type:'sight',title:'',sub:'',address:'',googleUrl:'',linkUrl:'',linkLabel:'',links:[],reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'',completed:false,move:'',hours:'',isNew:true}}
function emptyCandidate(){return {id:id(),type:'sight',title:'',sub:'',address:'',googleUrl:'',linkUrl:'',linkLabel:'',links:[],reservationNeeded:false,reservationStatus:'',waitingNeeded:false,waitingEstimate:'',menu:'',phrase:'',memo:'',move:'',hours:'',region:'',isNew:true}}
App=function(){const[trip,setTripRaw]=useState(load);const[tab,setTab]=useState('schedule');const[day,setDay]=useState(1);const[place,setPlace]=useState(null);const[candidate,setCandidate]=useState(null);const[tripEdit,setTripEdit]=useState(false);const[newCheck,setNewCheck]=useState('');const[notice,setNotice]=useState('');const[incoming,setIncoming]=useState(null);const setTrip=u=>setTripRaw(prev=>{const next=normalise(typeof u==='function'?u(prev):u);localStorage.setItem(KEY,JSON.stringify(next));return next});useEffect(()=>{if(!notice)return;const timer=setTimeout(()=>setNotice(''),3200);return()=>clearTimeout(timer)},[notice]);useEffect(()=>{try{const payload=new URLSearchParams(window.location.hash.slice(1)).get('trip');if(payload)setIncoming(decodeTrip(payload))}catch{setNotice('공유 링크를 읽지 못했습니다. 새 링크를 받아 다시 열어보세요.')}if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('./sw.js').catch(()=>{})},[]);const cur=trip.days.find(d=>d.idx===day)||trip.days[0];const addPlace=()=>setPlace(emptyPlace(day));const savePlace=p=>{setTrip(t=>({...t,days:t.days.map(d=>{if(d.idx!==p.dayIdx)return d;const clean=cleanItem(p);const exists=d.places.some(x=>x.id===p.id);return {...d,places:(exists?d.places.map(x=>x.id===p.id?clean:x):[...d.places,clean]).sort((a,b)=>String(a.time).localeCompare(String(b.time)))}})}));setPlace(null)};const delPlace=p=>{setTrip(t=>({...t,days:t.days.map(d=>d.idx===p.dayIdx?{...d,places:d.places.filter(x=>x.id!==p.id)}:d)}));setPlace(null)};const saveCandidate=c=>{setTrip(t=>{const clean=cleanItem(c);const exists=(t.candidates||[]).some(x=>x.id===c.id);return {...t,candidates:exists?t.candidates.map(x=>x.id===c.id?clean:x):[...(t.candidates||[]),clean]}});setCandidate(null)};const delCandidate=c=>{setTrip(t=>({...t,candidates:(t.candidates||[]).filter(x=>x.id!==c.id)}));setCandidate(null)};const addCandidateToSchedule=(c,targetDay,targetTime)=>{setTrip(t=>{const clean=cleanItem(c);const exists=(t.candidates||[]).some(x=>x.id===c.id);const candidates=exists?t.candidates.map(x=>x.id===c.id?clean:x):[...(t.candidates||[]),clean];const scheduled={...clean,id:id(),time:targetTime||'',completed:false};return {...t,candidates,days:t.days.map(d=>d.idx===Number(targetDay)?{...d,places:[...(d.places||[]),scheduled].sort((a,b)=>String(a.time).localeCompare(String(b.time)))}:d)}});setCandidate(null);setTab('schedule');setDay(Number(targetDay));setNotice('후보를 일정에 추가했습니다. 시간과 순서는 일정 카드에서 다시 수정할 수 있어요.')};const share=async()=>{const url=location.href.split('#')[0]+'#trip='+encodeURIComponent(encodeTrip(trip));try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(url);setNotice('공유 링크를 복사했습니다. 친구가 열면 자기 기기에 저장할 수 있어요.')}else window.prompt('공유 링크를 복사하세요.',url)}catch{window.prompt('공유 링크를 복사하세요.',url)}};const exportTrip=()=>{const blob=new Blob([JSON.stringify(trip,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='voyage-'+(trip.destination||'trip')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),300);setNotice('여행 계획 백업 파일을 저장했습니다.')};const importTrip=e=>{const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{setTrip(decodeTrip(encodeTrip(JSON.parse(reader.result))));setNotice('백업 파일을 이 기기에 불러왔습니다.')}catch{setNotice('읽을 수 없는 백업 파일입니다.')}e.target.value=''};reader.readAsText(file)};const acceptIncoming=()=>{setTrip(incoming);setIncoming(null);history.replaceState(null,'',location.pathname+location.search);setNotice('공유 받은 여행 계획을 이 기기에 저장했습니다.')};return <div className="shell"><div className="app"><header className="top"><div className="topline"><span className="pill">Voyage · 여행 일정</span><button className="icon" aria-label="여행 관리" onClick={()=>setTripEdit(true)}>⋯</button></div><h1>{trip.destination}</h1><div className="meta">{trip.dateLabel} · {trip.daysLabel} · {trip.companions}</div></header><main className="content">{tab==='schedule'&&<Schedule trip={trip} cur={cur} day={day} setDay={setDay} addPlace={addPlace} open={p=>setPlace({...p,dayIdx:day})}/>} {tab==='candidates'&&<CandidateLibrary trip={trip} open={c=>setCandidate(c)} add={()=>setCandidate(emptyCandidate())}/>} {tab==='check'&&<Checklist trip={trip} setTrip={setTrip} newCheck={newCheck} setNewCheck={setNewCheck}/>} {tab==='route'&&<Route trip={trip} day={day} setDay={setDay} open={p=>setPlace(p)}/>} {tab==='journal'&&<Journal trip={trip} setTrip={setTrip}/>}</main><nav className="bottom"><Nav id="schedule" label="일정" icon="▤" tab={tab} setTab={setTab}/><Nav id="candidates" label="후보" icon="＋" tab={tab} setTab={setTab}/><Nav id="check" label="체크" icon="✓" tab={tab} setTab={setTab}/><Nav id="route" label="동선" icon="⌖" tab={tab} setTab={setTab}/><Nav id="journal" label="메모" icon="✎" tab={tab} setTab={setTab}/></nav></div>{place&&<PlaceSheet place={place} setPlace={setPlace} save={savePlace} del={delPlace}/>} {candidate&&<CandidateSheet candidate={candidate} trip={trip} setCandidate={setCandidate} save={saveCandidate} del={delCandidate} addToSchedule={addCandidateToSchedule}/>} {tripEdit&&<TripSheet trip={trip} setTrip={setTrip} close={()=>setTripEdit(false)} share={share} exportTrip={exportTrip} importTrip={importTrip}/>} {incoming&&<IncomingSheet trip={incoming} accept={acceptIncoming} close={()=>{setIncoming(null);history.replaceState(null,'',location.pathname+location.search)}}/>}{notice&&<div className="toast">{notice}</div>}</div>}
function CandidateLibrary({trip,open,add}){const[filter,setFilter]=useState('all');const filters=[['all','전체'],['food','맛집/카페'],['sight','관광/쇼핑'],['transport','교통'],['activity','활동'],['stay','숙소']];const candidates=(trip.candidates||[]).filter(c=>filter==='all'||c.type===filter);return <><div className="head"><h3>후보 보관함</h3><button className="textbtn" onClick={add}>후보 추가</button></div><div className="notice">아직 확정하지 않은 맛집, 카페, 쇼핑, 교통 정보를 모아두는 곳입니다. 필요한 후보를 눌러 수정하거나 Day 일정에 추가하세요.</div><div className="filters">{filters.map(([id,label])=><button key={id} className={'filter '+(filter===id?'on':'')} onClick={()=>setFilter(id)}>{label}</button>)}</div><div className="candidategrid">{candidates.length?candidates.map(c=><button className="candidatecard" key={c.id} onClick={()=>open(c)}><div className="cardtop"><div><div className="title">{c.title||'후보명 미입력'}</div><div className="sub">{c.sub||c.address||'상세 내용을 입력하세요.'}</div></div><span className={'chip '+c.type}>{types[c.type]}</span></div><div className="tags">{c.region&&<span className="chip ghostchip">{c.region}</span>}{c.linkUrl&&<span className="chip ghostchip">{c.linkLabel||'링크'}</span>}{c.googleUrl&&<span className="chip ghostchip">Google Maps</span>}{c.reservationNeeded&&<span className="chip ghostchip">예약 후보</span>}</div><div className="meta2">{c.memo||'메모를 추가하세요.'}</div></button>):<div className="empty">이 구분에 후보가 없습니다. 후보 추가로 직접 입력하세요.</div>}</div></>}
function CandidateSheet({candidate,trip,setCandidate,save,del,addToSchedule}){const[day,setDay]=useState(trip.days[0]?.idx||1);const[time,setTime]=useState(candidate.time||'');const up=(k,v)=>setCandidate(p=>({...p,[k]:v}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className={'chip '+candidate.type}>후보 · {types[candidate.type]}</span><h2 style={{marginTop:8}}>{candidate.title||'후보 입력'}</h2></div><button className="icon" aria-label="닫기" onClick={()=>setCandidate(null)}>×</button></div><div className="grid"><Field label="분류"><select className="select" value={candidate.type} onChange={e=>up('type',e.target.value)}>{Object.entries(types).map(([v,l])=><option value={v} key={v}>{l}</option>)}</select></Field><Field label="지역"><input className="field" value={candidate.region||''} onChange={e=>up('region',e.target.value)} placeholder="가오슝, 타이난, 소류구"/></Field></div><Field label="후보명"><input className="field" value={candidate.title} onChange={e=>up('title',e.target.value)} placeholder="장소명 또는 이동 정보"/></Field><Field label="한 줄 설명"><input className="field" value={candidate.sub} onChange={e=>up('sub',e.target.value)} placeholder="왜 저장했는지 한 줄로"/></Field><Field label="주소 또는 검색어"><input className="field" value={candidate.address} onChange={e=>up('address',e.target.value)} placeholder="Google Maps 검색어"/></Field><Field label="Google Maps 링크"><input className="field" value={candidate.googleUrl} onChange={e=>up('googleUrl',e.target.value)} placeholder="비워두면 장소명+주소로 검색 링크 생성"/></Field><div className="grid"><Field label="예매/참고 링크 이름"><input className="field" value={candidate.linkLabel||''} onChange={e=>up('linkLabel',e.target.value)} placeholder="페리 예매, 후기, 시간표"/></Field><Field label="예매/참고 링크"><input className="field" value={candidate.linkUrl||''} onChange={e=>up('linkUrl',e.target.value)} placeholder="https://..."/></Field></div><div className="grid"><Field label="운영/이용 시간"><input className="field" value={candidate.hours||''} onChange={e=>up('hours',e.target.value)} placeholder="방문 전 확인"/></Field><Field label="예상 이동"><input className="field" value={candidate.move||''} onChange={e=>up('move',e.target.value)} placeholder="택시 15분, 도보 8분"/></Field></div><div className="switches"><button className={'toggle '+(candidate.reservationNeeded?'on':'')} onClick={()=>up('reservationNeeded',!candidate.reservationNeeded)}>예약 필요 {candidate.reservationNeeded?'ON':'OFF'}</button><button className={'toggle '+(candidate.waitingNeeded?'on':'')} onClick={()=>up('waitingNeeded',!candidate.waitingNeeded)}>웨이팅 {candidate.waitingNeeded?'ON':'OFF'}</button></div><div className="grid" style={{marginTop:10}}><Field label="예약 상태"><input className="field" value={candidate.reservationStatus||''} onChange={e=>up('reservationStatus',e.target.value)} placeholder="예매 후보, 예약 완료"/></Field><Field label="예상 웨이팅"><input className="field" value={candidate.waitingEstimate||''} onChange={e=>up('waitingEstimate',e.target.value)} placeholder="30분, 혼잡 가능"/></Field></div><Field label="추천 메뉴/구매 후보"><input className="field" value={candidate.menu||''} onChange={e=>up('menu',e.target.value)} placeholder="우육탕, 펑리수, 페리 왕복권"/></Field><Field label="번역/주문 문장"><textarea className="area" value={candidate.phrase||''} onChange={e=>up('phrase',e.target.value)} placeholder="현장에서 보여줄 문장"/></Field><Field label="메모"><textarea className="area" value={candidate.memo||''} onChange={e=>up('memo',e.target.value)} placeholder="주의사항, 출처, 예약 팁"/></Field><section className="panel"><h3>일정에 추가</h3><div className="grid"><Field label="Day 선택"><select className="select" value={day} onChange={e=>setDay(e.target.value)}>{trip.days.map(d=><option value={d.idx} key={d.idx}>DAY {d.idx} · {d.date}</option>)}</select></Field><Field label="시간"><input className="field" value={time} onChange={e=>setTime(e.target.value)} placeholder="예: 14:30"/></Field></div><button className="dark" style={{width:'100%'}} onClick={()=>addToSchedule(candidate,day,time)}>선택한 Day에 추가</button></section><div className="actions"><a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={mapsUrl(candidate)} target="_blank" rel="noreferrer">지도 열기</a>{candidate.linkUrl&&<a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={candidate.linkUrl} target="_blank" rel="noreferrer">{candidate.linkLabel||'링크 열기'}</a>}<button className="primary" onClick={()=>save(candidate)}>후보 저장</button></div>{!candidate.isNew&&<button className="danger" style={{width:'100%',marginTop:8}} onClick={()=>del(candidate)}>후보 삭제</button>}</div></div>}
function LinkEditor({item,setItem}){const links=normaliseLinks(item);const setLinks=next=>setItem(p=>({...p,linkUrl:'',linkLabel:'',links:next}));const update=(idx,key,value)=>setLinks(links.map((link,i)=>i===idx?{...link,[key]:value}:link));const remove=idx=>setLinks(links.filter((_,i)=>i!==idx));const add=()=>setLinks([...links,{id:id(),label:'',url:''}]);return <section className="panel"><div className="linkhead"><h3>링크 정리</h3><button className="textbtn" onClick={add}>링크 추가</button></div><p className="minor" style={{marginBottom:10}}>예매, 후기, 참고 자료 링크를 필요한 만큼 추가해두세요.</p><div className="linklist">{links.length?links.map((link,idx)=><div className="linkrow" key={link.id||idx}><div className="grid"><Field label="링크 이름"><input className="field" value={link.label||''} onChange={e=>update(idx,'label',e.target.value)} placeholder="예: 먹거리 후기, 페리 예매"/></Field><Field label="링크 주소"><input className="field" value={link.url||''} onChange={e=>update(idx,'url',e.target.value)} placeholder="https://..."/></Field></div><div className="linktools">{link.url?<a href={link.url} target="_blank" rel="noreferrer">링크 열기</a>:<button disabled>링크 열기</button>}<button onClick={()=>remove(idx)}>삭제</button></div></div>):<div className="empty" style={{padding:'16px 12px'}}>아직 정리한 링크가 없습니다.</div>}</div></section>}
Schedule=function ScheduleWithLinks({trip,cur,day,setDay,addPlace,open}){return <><Summary cur={cur} day={day}/><DayTabs trip={trip} day={day} setDay={setDay}/><div className="head"><h3>{cur.theme||'주요 일정'}</h3><button className="textbtn" onClick={addPlace}>장소 추가</button></div><div className="timeline">{cur.places.length?cur.places.map(p=>{const linkCount=normaliseLinks(p).length;return <div className="row" key={p.id}><div className="time">{p.time||'--:--'}</div><button className={'card '+(p.completed?'donecard':'')} onClick={()=>open(p)}><div className="cardtop"><div><div className="title">{p.title||'장소명 미입력'}</div><div className="sub">{p.sub||p.address||'상세 내용을 입력하세요.'}</div></div><span className={'chip '+p.type}>{types[p.type]}</span></div><div className="tags">{p.completed&&<span className="chip stay">다녀옴</span>}{p.reservationNeeded&&<span className="chip ghostchip">{p.reservationStatus||'예약 확인'}</span>}{p.waitingNeeded&&<span className="chip ghostchip">웨이팅 {p.waitingEstimate||'확인'}</span>}{p.move&&<span className="chip ghostchip">이동 {p.move}</span>}{linkCount>0&&<span className="chip ghostchip">링크 {linkCount}</span>}{p.phrase&&<span className="chip ghostchip">번역 문장</span>}</div></button></div>}) : <div className="empty">아직 입력된 일정이 없습니다. 장소 추가로 직접 입력하세요.</div>}</div></>}
Route=function RouteWithoutExtraLinks({trip,day,setDay,open}){const cur=trip.days.find(d=>d.idx===day)||trip.days[0];const pts=cur.places.map((p,i)=>({p,x:[64,135,218,292,105,250][i%6],y:[58,126,196,266,245,82][i%6]}));const path=pts.map((pt,i)=>(i?'L':'M')+pt.x+' '+pt.y).join(' ');return <><DayTabs trip={trip} day={day} setDay={setDay}/><div className="notice">일정 입력 순서대로 보는 동선 배치도입니다. 실제 위치와 길찾기는 각 장소의 Google Maps 링크에서 확인하세요.</div><section className="mapbox"><div className="river"/><svg className="route" viewBox="0 0 390 342" aria-label="일정 순서 동선"><path d={path} fill="none" stroke="#0F0F0F" strokeWidth="2.8" strokeDasharray="7 6" strokeLinecap="round"/></svg>{pts.map((pt,i)=><div key={pt.p.id} className="pin" style={{left:pt.x-17,top:pt.y-17,background:i%4===0?'var(--accentSoft)':i%4===1?'var(--lime)':i%4===2?'var(--coral)':'var(--sky)',color:i%4===0?'var(--accent)':i%4===2?'var(--coralInk)':i%4===3?'var(--skyInk)':'var(--ink)'}}>{i+1}</div>)}</section><div className="maplist">{cur.places.map((p,i)=><div className="mapitem" key={p.id}><div className="num">{i+1}</div><button className="textbtn" style={{textAlign:'left',color:'inherit',padding:0,flex:1}} onClick={()=>open({...p,dayIdx:day})}><b>{p.time||'--:--'} · {p.title}</b><span>{p.move?`다음 장소까지 ${p.move} · `:''}{p.address||p.sub||'주소를 입력하세요.'}</span></button><a href={mapsUrl(p)} target="_blank" rel="noreferrer">지도</a></div>)}</div></>}
PlaceSheet=function PlaceSheetWithLinkEditor({place,setPlace,save,del}){const up=(k,v)=>setPlace(p=>({...p,[k]:v}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className={'chip '+place.type}>DAY {place.dayIdx} · {types[place.type]}</span><h2 style={{marginTop:8}}>{place.title||'장소 입력'}</h2></div><button className="icon" aria-label="닫기" onClick={()=>setPlace(null)}>×</button></div><div className="grid"><Field label="시간"><input className="field" value={place.time||''} onChange={e=>up('time',e.target.value)} placeholder="13:00"/></Field><Field label="분류"><select className="select" value={place.type} onChange={e=>up('type',e.target.value)}>{Object.entries(types).map(([v,l])=><option value={v} key={v}>{l}</option>)}</select></Field></div><Field label="장소명"><input className="field" value={place.title||''} onChange={e=>up('title',e.target.value)} placeholder="딘타이펑 신이점"/></Field><Field label="한 줄 설명"><input className="field" value={place.sub||''} onChange={e=>up('sub',e.target.value)} placeholder="샤오롱바오 · 예약 완료"/></Field><Field label="주소 또는 검색어"><input className="field" value={place.address||''} onChange={e=>up('address',e.target.value)} placeholder="주소 또는 Google Maps 검색어"/></Field><Field label="Google Maps 링크"><input className="field" value={place.googleUrl||''} onChange={e=>up('googleUrl',e.target.value)} placeholder="https://maps.app.goo.gl/..."/></Field><div className="grid"><Field label="운영/이용 시간"><input className="field" value={place.hours||''} onChange={e=>up('hours',e.target.value)} placeholder="11:00 - 21:00"/></Field><Field label="다음 장소까지 이동"><input className="field" value={place.move||''} onChange={e=>up('move',e.target.value)} placeholder="도보 12분"/></Field></div><div className="switches"><button className={'toggle '+(place.reservationNeeded?'on':'')} onClick={()=>up('reservationNeeded',!place.reservationNeeded)}>예약 필요 {place.reservationNeeded?'ON':'OFF'}</button><button className={'toggle '+(place.waitingNeeded?'on':'')} onClick={()=>up('waitingNeeded',!place.waitingNeeded)}>웨이팅 {place.waitingNeeded?'ON':'OFF'}</button></div><button className={'toggle '+(place.completed?'on':'')} style={{width:'100%',marginTop:8}} onClick={()=>up('completed',!place.completed)}>방문 완료 {place.completed?'ON':'OFF'}</button><div className="grid" style={{marginTop:10}}><Field label="예약 상태"><input className="field" value={place.reservationStatus||''} onChange={e=>up('reservationStatus',e.target.value)} placeholder="예약 완료"/></Field><Field label="예상 웨이팅"><input className="field" value={place.waitingEstimate||''} onChange={e=>up('waitingEstimate',e.target.value)} placeholder="30~45분"/></Field></div><Field label="추천 메뉴"><input className="field" value={place.menu||''} onChange={e=>up('menu',e.target.value)} placeholder="샤오롱바오, 우육면"/></Field><Field label="번역/주문 문장"><textarea className="area" value={place.phrase||''} onChange={e=>up('phrase',e.target.value)} placeholder="현장에서 보여줄 문장을 미리 적어두세요."/></Field><Field label="메모"><textarea className="area" value={place.memo||''} onChange={e=>up('memo',e.target.value)} placeholder="주의사항, 결제, 이동 팁"/></Field><LinkEditor item={place} setItem={setPlace}/><div className="actions"><a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={mapsUrl(place)} target="_blank" rel="noreferrer">지도 열기</a><button className="primary" onClick={()=>save(place)}>저장</button></div>{!place.isNew&&<button className="danger" style={{width:'100%',marginTop:8}} onClick={()=>del(place)}>장소 삭제</button>}</div></div>}
CandidateLibrary=function CandidateLibraryWithLinks({trip,open,add}){const[filter,setFilter]=useState('all');const filters=[['all','전체'],['food','맛집/카페'],['sight','관광/쇼핑'],['transport','교통'],['activity','활동'],['stay','숙소']];const candidates=(trip.candidates||[]).filter(c=>filter==='all'||c.type===filter);return <><div className="head"><h3>후보 보관함</h3><button className="textbtn" onClick={add}>후보 추가</button></div><div className="notice">아직 확정하지 않은 맛집, 카페, 쇼핑, 교통 정보를 모아두는 곳입니다. 필요한 후보를 눌러 수정하거나 Day 일정에 추가하세요.</div><div className="filters">{filters.map(([id,label])=><button key={id} className={'filter '+(filter===id?'on':'')} onClick={()=>setFilter(id)}>{label}</button>)}</div><div className="candidategrid">{candidates.length?candidates.map(c=>{const linkCount=normaliseLinks(c).length;return <button className="candidatecard" key={c.id} onClick={()=>open(c)}><div className="cardtop"><div><div className="title">{c.title||'후보명 미입력'}</div><div className="sub">{c.sub||c.address||'상세 내용을 입력하세요.'}</div></div><span className={'chip '+c.type}>{types[c.type]}</span></div><div className="tags">{c.region&&<span className="chip ghostchip">{c.region}</span>}{linkCount>0&&<span className="chip ghostchip">링크 {linkCount}</span>}{c.googleUrl&&<span className="chip ghostchip">Google Maps</span>}{c.reservationNeeded&&<span className="chip ghostchip">예약 후보</span>}</div><div className="meta2">{c.memo||'메모를 추가하세요.'}</div></button>}) : <div className="empty">이 구분에 후보가 없습니다. 후보 추가로 직접 입력하세요.</div>}</div></>}
CandidateSheet=function CandidateSheetWithLinkEditor({candidate,trip,setCandidate,save,del,addToSchedule}){const[day,setDay]=useState(trip.days[0]?.idx||1);const[time,setTime]=useState(candidate.time||'');const up=(k,v)=>setCandidate(p=>({...p,[k]:v}));return <div className="sheetback"><div className="sheet"><div className="sheethead"><div><span className={'chip '+candidate.type}>후보 · {types[candidate.type]}</span><h2 style={{marginTop:8}}>{candidate.title||'후보 입력'}</h2></div><button className="icon" aria-label="닫기" onClick={()=>setCandidate(null)}>×</button></div><div className="grid"><Field label="분류"><select className="select" value={candidate.type} onChange={e=>up('type',e.target.value)}>{Object.entries(types).map(([v,l])=><option value={v} key={v}>{l}</option>)}</select></Field><Field label="지역"><input className="field" value={candidate.region||''} onChange={e=>up('region',e.target.value)} placeholder="가오슝, 타이난, 소류구"/></Field></div><Field label="후보명"><input className="field" value={candidate.title||''} onChange={e=>up('title',e.target.value)} placeholder="장소명 또는 이동 정보"/></Field><Field label="한 줄 설명"><input className="field" value={candidate.sub||''} onChange={e=>up('sub',e.target.value)} placeholder="왜 저장했는지 한 줄로"/></Field><Field label="주소 또는 검색어"><input className="field" value={candidate.address||''} onChange={e=>up('address',e.target.value)} placeholder="Google Maps 검색어"/></Field><Field label="Google Maps 링크"><input className="field" value={candidate.googleUrl||''} onChange={e=>up('googleUrl',e.target.value)} placeholder="비워두면 장소명+주소로 검색 링크 생성"/></Field><div className="grid"><Field label="운영/이용 시간"><input className="field" value={candidate.hours||''} onChange={e=>up('hours',e.target.value)} placeholder="방문 전 확인"/></Field><Field label="예상 이동"><input className="field" value={candidate.move||''} onChange={e=>up('move',e.target.value)} placeholder="택시 15분, 도보 8분"/></Field></div><div className="switches"><button className={'toggle '+(candidate.reservationNeeded?'on':'')} onClick={()=>up('reservationNeeded',!candidate.reservationNeeded)}>예약 필요 {candidate.reservationNeeded?'ON':'OFF'}</button><button className={'toggle '+(candidate.waitingNeeded?'on':'')} onClick={()=>up('waitingNeeded',!candidate.waitingNeeded)}>웨이팅 {candidate.waitingNeeded?'ON':'OFF'}</button></div><div className="grid" style={{marginTop:10}}><Field label="예약 상태"><input className="field" value={candidate.reservationStatus||''} onChange={e=>up('reservationStatus',e.target.value)} placeholder="예매 후보, 예약 완료"/></Field><Field label="예상 웨이팅"><input className="field" value={candidate.waitingEstimate||''} onChange={e=>up('waitingEstimate',e.target.value)} placeholder="30분, 혼잡 가능"/></Field></div><Field label="추천 메뉴/구매 후보"><input className="field" value={candidate.menu||''} onChange={e=>up('menu',e.target.value)} placeholder="우육탕, 펑리수, 페리 왕복권"/></Field><Field label="번역/주문 문장"><textarea className="area" value={candidate.phrase||''} onChange={e=>up('phrase',e.target.value)} placeholder="현장에서 보여줄 문장"/></Field><Field label="메모"><textarea className="area" value={candidate.memo||''} onChange={e=>up('memo',e.target.value)} placeholder="주의사항, 출처, 예약 팁"/></Field><LinkEditor item={candidate} setItem={setCandidate}/><section className="panel"><h3>일정에 추가</h3><div className="grid"><Field label="Day 선택"><select className="select" value={day} onChange={e=>setDay(e.target.value)}>{trip.days.map(d=><option value={d.idx} key={d.idx}>DAY {d.idx} · {d.date}</option>)}</select></Field><Field label="시간"><input className="field" value={time} onChange={e=>setTime(e.target.value)} placeholder="예: 14:30"/></Field></div><button className="dark" style={{width:'100%'}} onClick={()=>addToSchedule(candidate,day,time)}>선택한 Day에 추가</button></section><div className="actions"><a className="btn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',textDecoration:'none'}} href={mapsUrl(candidate)} target="_blank" rel="noreferrer">지도 열기</a><button className="primary" onClick={()=>save(candidate)}>후보 저장</button></div>{!candidate.isNew&&<button className="danger" style={{width:'100%',marginTop:8}} onClick={()=>del(candidate)}>후보 삭제</button>}</div></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
